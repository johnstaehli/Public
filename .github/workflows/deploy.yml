name: Deploy to alceste.ch

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to alceste.ch/wine/
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mkdir -p /wine;
            mkdir -p /wine/private;
            put -O /wine index.html;
            put -O /wine/private wine_private.html -o index.html;
            bye
          "
        env:
          FTP_HOST: ${{ secrets.FTP_HOTT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
