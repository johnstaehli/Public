name: Deploy Wine Dashboard

on:
  push:
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP and configure auth
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import ftplib, os, io, time, urllib.request

          HOST = os.environ['FTP_HOST']
          USER = os.environ['FTP_USER']
          PASS = os.environ['FTP_PASS']

          ftp = ftplib.FTP()
          ftp.connect(HOST, 21, timeout=30)
          ftp.login(USER, PASS)
          print('Connected. Root:', ftp.pwd())

          # Upload public dashboard
          ftp.cwd('web')
          try: ftp.mkd('wine')
          except: pass
          ftp.cwd('wine')
          with open('index.html', 'rb') as f:
              print('index.html:', ftp.storbinary('STOR index.html', f))

          # Upload private dashboard
          try: ftp.mkd('private')
          except: pass
          ftp.cwd('private')
          with open('wine_private.html', 'rb') as f:
              print('wine_private/index.html:', ftp.storbinary('STOR index.html', f))

          # PHP probe at web ROOT (not /private/ which may be auth-protected)
          probe = b'<?php echo realpath(__DIR__ . "/.."); ?>'
          ftp.cwd('..')  # private -> wine
          ftp.cwd('..')  # wine -> web
          ftp.storbinary('STOR probe.php', io.BytesIO(probe))
          print('Probe uploaded to web root')
          time.sleep(4)

          try:
              req = urllib.request.urlopen('https://www.alceste.ch/probe.php', timeout=12)
              account_root = req.read().decode().strip()
              print('Account root:', account_root)
              ftp.delete('probe.php')
              print('Probe cleaned up')

              # Upload .htpasswd to account root (above web, not web-accessible)
              htpasswd = b'john:$apr1$LbllcFBd$4JMINScpSmw0cAj0UjY.n/\n'
              ftp.cwd('..')  # web -> account root /
              ftp.storbinary('STOR .htpasswd_wine', io.BytesIO(htpasswd))
              print('.htpasswd_wine uploaded to account root')

              # Build and upload .htaccess to wine/private/
              passwd_path = account_root + '/.htpasswd_wine'
              htaccess = (
                  'AuthType Basic\n'
                  'AuthName "Edulis Wine - Private"\n'
                  'AuthUserFile ' + passwd_path + '\n'
                  'Require valid-user\n'
              ).encode()
              ftp.cwd('web')
              ftp.cwd('wine')
              ftp.cwd('private')
              ftp.storbinary('STOR .htaccess', io.BytesIO(htaccess))
              print('.htaccess uploaded. AuthUserFile:', passwd_path)

          except Exception as e:
              print('Auth setup error:', type(e).__name__, e)
              try:
                  ftp.cwd('web')
                  ftp.delete('probe.php')
              except: pass

          ftp.quit()
          print('Deploy complete.')
          PYEOF
