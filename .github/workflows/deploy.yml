name: Deploy to alceste.ch

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public dashboard
        run: |
          curl -v --ftp-ssl --ftp-create-dirs \
            -T index.html \
            "ftp://$FTP_HOST/wine/index.html" \
            --user "$FTP_USER:$FTP_PASS"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy private dashboard
        run: |
          curl -v --ftp-ssl --ftp-create-dirs \
            -T wine_private.html \
            "ftp://$FTP_HOST/wine/private/index.html" \
            --user "$FTP_USER:$FTP_PASS"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
