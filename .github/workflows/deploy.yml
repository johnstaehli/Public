name: Deploy to alceste.ch

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p _deploy/private
          cp index.html _deploy/index.html
          cp wine_private.html _deploy/private/index.html

      - name: Deploy to alceste.ch/wine/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_deploy/
          server-dir: ./wine/
          dangerous-clean-slate: false
