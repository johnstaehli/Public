name: Deploy to alceste.ch

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP debug deploy
        run: |
          python3 << 'PYEOF'
          import ftplib, ssl, os

          HOST = os.environ['FTP_HOST']
          USER = os.environ['FTP_USER']
          PASS = os.environ['FTP_PASS']

          # Try plain FTP first (no SSL) to isolate SSL issues
          print("=== Trying plain FTP (no SSL) ===")
          try:
              ftp = ftplib.FTP()
              ftp.set_debuglevel(1)
              ftp.connect(HOST, 21, timeout=30)
              ftp.login(USER, PASS)
              print(f"PWD: {ftp.pwd()}")
              print(f"LIST root: {ftp.nlst('.')}")

              # Try to create wine dir and upload test file
              try:
                  ftp.mkd('wine')
              except:
                  pass
              ftp.cwd('wine')
              print(f"PWD after cd wine: {ftp.pwd()}")
              with open('wine_private.html', 'rb') as f:
                  resp = ftp.storbinary('STOR test_upload.html', f)
              print(f"STOR response: {resp}")
              print(f"LIST wine after upload: {ftp.nlst('.')}")
              ftp.quit()
              print("Plain FTP: SUCCESS")
          except Exception as e:
              print(f"Plain FTP failed: {e}")

          PYEOF
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
