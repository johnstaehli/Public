name: Deploy Wine Dashboard

on:
  push:
    paths:
      - 'index.html'
      - 'wine_private.html'
      - 'edulis_last_processed.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 << 'PYEOF'
import ftplib, os

HOST = os.environ['FTP_HOST']
USER = os.environ['FTP_USER']
PASS = os.environ['FTP_PASS']

def ensure_dir(ftp, path):
    parts = [p for p in path.split('/') if p]
    for part in parts:
        try:
            ftp.mkd(part)
        except:
            pass
        ftp.cwd(part)

ftp = ftplib.FTP()
ftp.connect(HOST, 21, timeout=30)
ftp.login(USER, PASS)

# Navigate to web root
ftp.cwd('web')

# Ensure wine/ exists
try:
    ftp.mkd('wine')
except:
    pass

# Upload public dashboard
ftp.cwd('wine')
with open('index.html', 'rb') as f:
    resp = ftp.storbinary('STOR index.html', f)
print(f'index.html: {resp}')

# Ensure wine/private/ exists
try:
    ftp.mkd('private')
except:
    pass

# Upload private dashboard
ftp.cwd('private')
with open('wine_private.html', 'rb') as f:
    resp = ftp.storbinary('STOR index.html', f)
print(f'wine_private/index.html: {resp}')

ftp.quit()
print('Done.')
PYEOF
