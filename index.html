<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edulis Wine Database</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --card: #1e1e1e;
  --border: #2a2a2a;
  --accent: #c9a84c;
  --accent2: #8b6914;
  --text: #e8e8e8;
  --muted: #888;
  --green: #4caf7d;
  --red: #e05555;
  --blue: #4a90d9;
  --pill-bg: #252525;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex;
                align-items: center; gap: 16px; height: 56px; }
.logo { font-size: 18px; font-weight: 700; color: var(--accent);
        letter-spacing: .5px; white-space: nowrap; }
.logo span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
.search-wrap { flex: 1; max-width: 420px; position: relative; }
.search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 8px 12px 8px 36px;
  font-size: 14px; outline: none; transition: border .2s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
               color: var(--muted); font-size: 14px; }
.updated { color: var(--muted); font-size: 11px; white-space: nowrap; margin-left: auto; }

/* TABS */
.tabs { background: var(--surface); border-bottom: 1px solid var(--border); }
.tabs-inner { max-width: 1200px; margin: 0 auto; display: flex; padding: 0 20px; gap: 4px; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
       cursor: pointer; border-bottom: 2px solid transparent; transition: .2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* STATS BAR */
.stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; }
.stats-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 28px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* FILTERS */
.filters { max-width: 1200px; margin: 0 auto; padding: 14px 20px;
           display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-btn { background: var(--pill-bg); border: 1px solid var(--border); color: var(--muted);
              border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
              transition: .15s; white-space: nowrap; }
.filter-btn.active { background: var(--accent2); border-color: var(--accent); color: var(--accent); }
.filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.filter-sep { color: var(--border); }

/* SORT ROW */
.sort-row { max-width: 1200px; margin: 0 auto; padding: 0 20px 10px;
            display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
.sort-btn { cursor: pointer; padding: 3px 8px; border-radius: 4px; transition: .15s; }
.sort-btn.active { color: var(--accent); background: var(--pill-bg); }
.sort-btn:hover:not(.active) { color: var(--text); }
.result-count { margin-left: auto; color: var(--muted); }

/* WINE LIST */
.list { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }

.wine-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
             margin-bottom: 6px; overflow: hidden; transition: border .15s; }
.wine-card:hover { border-color: #3a3a3a; }
.wine-card.expanded { border-color: var(--accent2); }

.wine-row { display: grid; grid-template-columns: 1fr auto; gap: 10px;
            padding: 12px 14px; cursor: pointer; align-items: center; }
.wine-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.wine-name { font-size: 14px; font-weight: 600; color: var(--text);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wine-sub { font-size: 12px; color: var(--muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wine-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.price-main { font-size: 16px; font-weight: 700; color: var(--accent); }
.price-sub { display: flex; gap: 6px; align-items: center; }
.delta-up { color: var(--red); font-size: 11px; font-weight: 600; }
.delta-dn { color: var(--green); font-size: 11px; font-weight: 600; }
.delta-flat { color: var(--muted); font-size: 11px; }
.badge-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.badge-bought { background: rgba(76,175,125,.15); color: var(--green); border: 1px solid rgba(76,175,125,.3); }
.badge-count { background: var(--pill-bg); color: var(--muted); border: 1px solid var(--border); }
.badge-disc { background: rgba(201,168,76,.1); color: var(--accent); border: 1px solid rgba(201,168,76,.25); }
.expand-icon { color: var(--muted); font-size: 12px; margin-left: 4px; transition: transform .2s; }
.expanded .expand-icon { transform: rotate(180deg); }

/* HISTORY PANEL */
.history-panel { border-top: 1px solid var(--border); padding: 12px 14px 14px;
                 background: #181818; display: none; }
.wine-card.expanded .history-panel { display: block; }
.hist-title { font-size: 11px; font-weight: 700; color: var(--muted);
              text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.hist-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.hist-table th { color: var(--muted); font-weight: 600; text-align: left;
                 padding: 3px 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
.hist-table td { padding: 5px 8px; border-bottom: 1px solid #1f1f1f; vertical-align: top; }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table td.price { font-weight: 700; color: var(--accent); }
.hist-table td.list { color: var(--muted); text-decoration: line-through; }
.hist-table td.dn { color: var(--green); font-weight: 600; }
.hist-table td.up { color: var(--red); font-weight: 600; }
.hist-table td.subj { color: var(--muted); font-size: 11px; max-width: 280px;
                      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pur-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.pur-row { display: flex; gap: 12px; font-size: 12px; padding: 4px 0;
           flex-wrap: wrap; align-items: baseline; }
.pur-date { color: var(--muted); }
.pur-qty { color: var(--blue); font-weight: 600; }
.pur-price { color: var(--accent); }
.pur-note { color: var(--muted); font-style: italic; font-size: 11px; }

/* PURCHASES TAB */
.pur-table-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; overflow-x: auto; }
.pur-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pur-table th { background: var(--card); color: var(--muted); font-weight: 600;
               text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border);
               font-size: 11px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.pur-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.pur-table tr:hover td { background: var(--card); }
.pur-table td.name { font-weight: 600; }
.pur-table td.price-cell { color: var(--accent); font-weight: 700; text-align: right; }
.pur-table td.total-cell { color: var(--text); font-weight: 700; text-align: right; }
.pur-table td.qty-cell { color: var(--blue); text-align: center; }
.pur-table td.muted { color: var(--muted); }
.pur-total-row td { background: var(--surface); font-weight: 700; color: var(--accent);
                    border-top: 2px solid var(--border); }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty big { display: block; font-size: 36px; margin-bottom: 10px; }

/* MOBILE */
@media (max-width: 600px) {
  .stats-inner { gap: 16px; }
  .wine-name { font-size: 13px; }
  .price-main { font-size: 14px; }
  .hist-table td.subj { display: none; }
  .header-inner { gap: 10px; }
  .logo span { display: none; }
}
</style>
</head>

  if (a.includes('Bourgogne')||a.includes('Burgundy')||a.includes('CÃ´te')||a.includes('Chablis')||a.includes('Gevrey')||a.includes('Meursault')||a.includes('Puligny')||a.includes('Chambolle')||a.includes('Nuits')||a.includes('Vougeot')||a.includes('Vosne')) return 'Burgundy';
  if (a.includes('Bordeaux')||a.includes('Pauillac')||a.includes('Pomerol')||a.includes('Margaux')||a.includes('Saint-Emilion')||a.includes('Pessac')||a.includes('MÃ©doc')||a.includes('Saint-EstÃ¨phe')) return 'Bordeaux';
  if (a.includes('RhÃ´ne')||a.includes('ChÃ¢teauneuf')||a.includes('CÃ´te-RÃ´tie')||a.includes('Hermitage')||a.includes('Gigondas')||a.includes('Condrieu')||a.includes('Cornas')) return 'RhÃ´ne';
  if (a.includes('Toscana')||a.includes('Montalcino')||a.includes('Bolgheri')||a.includes('Chianti')||a.includes('Barolo')||a.includes('Barbaresco')||a.includes('Piemonte')) return 'Italy';
  if (a.includes('Champagne')) return 'Champagne';
  if (a.includes('Loire')||a.includes('Sancerre')||a.includes('Pouilly')||a.includes('Vouvray')) return 'Loire';
  if (a.includes('Languedoc')||a.includes('Provence')||a.includes('Roussillon')) return 'South France';
  if (a.includes('Rioja')||a.includes('Ribera')||a.includes('Priorat')) return 'Spain';
  if (a.includes('Alsace')) return 'Alsace';
  if (a.includes('GraubÃ¼nden')||a.includes('Valais')||a.includes('Grisons')||a.includes('Ticino')) return 'Switzerland';
  return 'Other';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let wines = WINES.filter(w => {
    if (q) {
      const hay = (w.wine + ' ' + w.producer + ' ' + w.appellation).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (currentFilter === 'purchased') return w.purchased;
    if (currentFilter === 'repeat') return w.offer_count > 1;
    if (currentFilter === 'discounted') return w.history.some(h => h.list_price);
    if (currentFilter !== 'all') return regionOf(w) === currentFilter;
    return true;
  });

  const dir = {'name': (a,b) => a.wine.localeCompare(b.wine),
               'price': (a,b) => a.latest_price - b.latest_price,
               'price-d': (a,b) => b.latest_price - a.latest_price,
               'recent': (a,b) => b.latest_date.localeCompare(a.latest_date),
               'count': (a,b) => b.offer_count - a.offer_count}[currentSort];
  wines.sort(dir);

  document.getElementById('result-count').textContent = wines.length.toLocaleString() + ' wines';
  renderWines(wines);
}

function renderWines(wines) {
  const container = document.getElementById('wine-list');
  if (!wines.length) {
    container.innerHTML = '<div class="empty"><big>ð¾</big>No wines match your search</div>';
    return;
  }
  container.innerHTML = wines.map((w, i) => {
    const vint = w.vintage ? w.vintage : 'NV';
    const pct = w.overall_pct;
    let deltaHtml = '';
    if (pct !== null && pct !== undefined && w.offer_count > 1) {
      if (pct > 0) deltaHtml = `<span class="delta-up">â² ${pct}%</span>`;
      else if (pct < 0) deltaHtml = `<span class="delta-dn">â¼ ${Math.abs(pct)}%</span>`;
      else deltaHtml = `<span class="delta-flat">â stable</span>`;
    }
    const latestH = w.history[w.history.length - 1];
    const disc = latestH && latestH.list_price ? Math.round((latestH.list_price - latestH.price) / latestH.list_price * 100) : 0;
    const badges = [
      w.purchased ? '<span class="badge badge-bought">â Purchased</span>' : '',
      w.offer_count > 1 ? `<span class="badge badge-count">${w.offer_count}Ã offered</span>` : '',
      disc > 0 ? `<span class="badge badge-disc">-${disc}%</span>` : ''
    ].filter(Boolean).join('');

    const histRows = w.history.map(h => {
      const deltaCell = h.delta !== null && h.delta !== undefined
        ? (h.delta > 0 ? `<td class="up">â² ${h.delta > 0 ? '+' : ''}${h.delta.toFixed(0)} (${h.delta_pct > 0 ? '+' : ''}${h.delta_pct}%)</td>`
                       : `<td class="dn">â¼ ${h.delta.toFixed(0)} (${h.delta_pct}%)</td>`)
        : '<td>â</td>';
      const listCell = h.list_price ? `<td class="list">${h.list_price.toFixed(0)}</td>` : '<td></td>';
      return `<tr><td>${h.date}</td><td class="price">${h.price.toFixed(0)}</td>${listCell}${deltaCell}<td class="subj">${h.subject}</td></tr>`;
    }).join('');

    const purRows = w.purchased && w.purchase_records.length ? 
      `<div class="pur-section"><div class="hist-title">Your Purchases</div>` +
      w.purchase_records.map(p => 
        `<div class="pur-row"><span class="pur-date">${p.date}</span><span class="pur-qty">${p.qty} bt</span><span class="pur-price">CHF ${p.price.toFixed(0)}/bt</span><span class="pur-note">${p.note}</span></div>`
      ).join('') + '</div>' : '';

    return `<div class="wine-card" id="card-${i}">
      <div class="wine-row" onclick="toggle(${i})">
        <div class="wine-main">
          <div class="wine-name">${w.wine} ${vint}</div>
          <div class="wine-sub">${w.producer}${w.appellation ? ' Â· ' + w.appellation : ''} Â· Last offer ${w.latest_date}</div>
        </div>
        <div class="wine-right">
          <div class="price-main">CHF ${w.latest_price.toFixed(0)}</div>
          <div class="price-sub">${deltaHtml}<span class="expand-icon">â¼</span></div>
          <div class="badge-row">${badges}</div>
        </div>
      </div>
      <div class="history-panel">
        <div class="hist-title">Price History (${w.offer_count} offer${w.offer_count > 1 ? 's' : ''})</div>
        <table class="hist-table">
          <thead><tr><th>Date</th><th>Price CHF</th><th>List Price</th><th>Change</th><th>Offer</th></tr></thead>
          <tbody>${histRows}</tbody>
        </table>
        ${purRows}
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  const card = document.getElementById('card-' + i);
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
  } else {
    document.querySelectorAll('.wine-card.expanded').forEach(c => c.classList.remove('expanded'));
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Purchases tab
function renderPurchases() {
  const body = document.getElementById('pur-body');
  let total_bottles = 0, total_spend = 0;
  body.innerHTML = PURCHASES.map(p => {
    const tot = p.total || 0;
    total_bottles += p.qty || 0;
    total_spend += tot;
    return `<tr>
      <td class="muted">${p.date}</td>
      <td class="name">${p.wine} ${p.vintage || 'NV'}</td>
      <td class="muted">${p.producer}</td>
      <td class="muted">${p.appellation}</td>
      <td class="muted" style="text-align:center">${p.vintage || 'â'}</td>
      <td class="qty-cell">${p.qty || 'â'}</td>
      <td class="price-cell">${p.price ? p.price.toFixed(0) : 'â'}</td>
      <td class="total-cell">${tot ? tot.toFixed(0) : 'â'}</td>
      <td class="muted" style="font-size:11px">${p.note}</td>
    </tr>`;
  }).join('');
  document.getElementById('pur-foot').innerHTML = `<tr class="pur-total-row">
    <td colspan="5" style="text-align:right;padding:10px 12px;color:var(--muted)">TOTAL</td>
    <td style="text-align:center;padding:10px 12px">${total_bottles}</td>
    <td></td>
    <td style="text-align:right;padding:10px 12px">CHF ${total_spend.toFixed(0)}</td>
    <td></td>
  </tr>`;
}

// Evolution tab
function renderEvolution() {
  const multi = WINES.filter(w => w.offer_count > 1).sort((a,b) => {
    const ap = Math.abs(a.overall_pct || 0), bp = Math.abs(b.overall_pct || 0);
    return bp - ap;
  });
  document.getElementById('evol-list').innerHTML = multi.map((w, i) => {
    const vint = w.vintage || 'NV';
    const pct = w.overall_pct;
    let trendHtml = 'â';
    if (pct !== null && pct !== undefined) {
      if (pct > 0) trendHtml = `<span class="delta-up">â² ${pct}%</span>`;
      else if (pct < 0) trendHtml = `<span class="delta-dn">â¼ ${Math.abs(pct)}%</span>`;
      else trendHtml = '<span class="delta-flat">stable</span>';
    }
    const prices = w.history.map(h => `${h.date}: CHF ${h.price.toFixed(0)}`).join(' â ');
    return `<div class="wine-card" id="evol-${i}">
      <div class="wine-row" onclick="toggleEvol(${i})">
        <div class="wine-main">
          <div class="wine-name">${w.wine} ${vint}</div>
          <div class="wine-sub">${w.producer} Â· ${w.appellation} Â· ${w.offer_count} offers</div>
          <div class="wine-sub" style="margin-top:3px;color:var(--muted);font-size:11px">${prices}</div>
        </div>
        <div class="wine-right">
          <div class="price-main">${trendHtml}</div>
          <div class="price-sub" style="font-size:11px;color:var(--muted)">
            CHF ${w.history[0].price.toFixed(0)} â CHF ${w.latest_price.toFixed(0)}
            <span class="expand-icon">â¼</span>
          </div>
          ${w.purchased ? '<div class="badge-row"><span class="badge badge-bought">â Purchased</span></div>' : ''}
        </div>
      </div>
      <div class="history-panel">
        <div class="hist-title">All Offers</div>
        <table class="hist-table">
          <thead><tr><th>Date</th><th>Price CHF</th><th>List Price</th><th>Change</th><th>Offer</th></tr></thead>
          <tbody>${w.history.map(h => {
            const dc = h.delta !== null && h.delta !== undefined
              ? (h.delta > 0 ? `<td class="up">+${h.delta.toFixed(0)} (+${h.delta_pct}%)</td>` : `<td class="dn">${h.delta.toFixed(0)} (${h.delta_pct}%)</td>`)
              : '<td>â</td>';
            const lc = h.list_price ? `<td class="list">${h.list_price.toFixed(0)}</td>` : '<td></td>';
            return `<tr><td>${h.date}</td><td class="price">${h.price.toFixed(0)}</td>${lc}${dc}<td class="subj">${h.subject}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleEvol(i) {
  const card = document.getElementById('evol-' + i);
  card.classList.toggle('expanded');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['offers','evolution','purchases'][i] === tab);
  });
  document.getElementById('tab-offers').style.display = tab === 'offers' ? '' : 'none';
  document.getElementById('tab-evolution').style.display = tab === 'evolution' ? '' : 'none';
  document.getElementById('tab-purchases').style.display = tab === 'purchases' ? '' : 'none';
}

// Init
applyFilters();
renderPurchases();
renderEvolution();
</script>
</body>
