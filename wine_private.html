<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine - Private</title>
<link rel="icon" href="../favicon-wine.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f12;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:24px 16px}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc;margin-bottom:4px}
.sub{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat{background:#1a1a24;border:1px solid #2d2d3d;border-radius:10px;padding:16px}
.stat-label{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:1.6rem;font-weight:700;color:#a78bfa}
.stat-value.sm{font-size:1.1rem}
.stat-nil{font-size:1.6rem;font-weight:700;color:#334155}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#1a1a24;border-radius:8px;padding:4px;width:fit-content}
.tab{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;font-weight:500;background:transparent;color:#94a3b8;transition:.15s}
.tab.active{background:#a78bfa;color:#0f0f12}
.panel{display:none}.panel.active{display:block}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #2d2d3d}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:#1a1a24;color:#64748b;font-weight:600;text-align:left;padding:10px 12px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:9px 12px;border-top:1px solid #1e1e2d;color:#cbd5e1;vertical-align:top}
tr:hover td{background:#13131c}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.73rem;font-weight:600}
.badge-red{background:#3b1a1a;color:#f87171}
.badge-save{background:#1a2e1a;color:#4ade80;font-size:.71rem}
.empty{text-align:center;padding:48px 24px;color:#475569}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-title{font-size:1rem;font-weight:600;color:#64748b;margin-bottom:6px}
.empty-desc{font-size:.82rem;color:#475569}
.price{font-weight:600;color:#a78bfa}
.orig{text-decoration:line-through;color:#475569;font-size:.78rem;margin-left:4px}
.retailer{color:#64748b;font-size:.78rem}
.retailer-name{color:#94a3b8;font-size:.80rem}
.retailer-domain{color:#475569;font-size:.70rem;display:block}
</style>
</head>
<body>
<h1>Wine DB — Private</h1>
<div class="sub" id="updated-date">Updated: 2026-04-24</div>
<div class="stats" id="stats-area"></div>
<div class="tabs">
  <button class="tab active" onclick="showTab('offers')">All Offers</button>
  <button class="tab" onclick="showTab('purchases')">Purchases</button>
</div>
<div id="panel-offers" class="panel active">
  <div class="tbl-wrap">
    <table id="offers-table">
      <thead><tr>
        <th>Date</th><th>Wine</th><th>Producer</th><th>Appellation</th>
        <th>Vintage</th><th>Price CHF</th><th>Retailer</th>
      </tr></thead>
      <tbody id="offers-body"></tbody>
    </table>
  </div>
</div>
<div id="panel-purchases" class="panel">
  <div class="tbl-wrap">
    <table id="purchases-table">
      <thead><tr>
        <th>Date</th><th>Wine</th><th>Producer"><th>Appellation</th>
        <th>Vintage</th><th>Qty</th><th>Price/bt CHF</th><th>Note</th>
      </tr></thead>
      <tbody id="purchases-body"></tbody>
    </table>
  </div>
</div>
<script>
const P=[];const O=[{"Date":"2026-04-21","Wine":"Ruinart Brut R","Producer":"Ruinart","Appellation":"Champagne","Vintage":"NV","Price_CHF":39,"Original_Price_CHF":44,"Email_Subject":"Champagne RUINART @ CHF 39.- ...Amazing!!..","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-21","Wine":"Petrolo Boggina B","Producer":"Petrolo","Appellation":"Toscana IGT","Vintage":"2021","Price_CHF":45,"Original_Price_CHF":45,"Email_Subject":"Great Trebbiano PETROLO ~ 3000 Bottles ONLY","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-21","Wine":"Château Boyd-Cantenac","Producer":"Château Boyd-Cantenac","Appellation":"Margaux","Vintage":"2015","Price_CHF":39,"Original_Price_CHF":39,"Email_Subject":"MARGAUX 2015 @ CHF 39.- ...hidden gems from the appellation...NM","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-21","Wine":"Insignia","Producer":"Joseph Phelps","Appellation":"Napa Valley","Vintage":"2019","Price_CHF":165,"Original_Price_CHF":214,"Email_Subject":"INSIGNIA 2019 : Awarded 99/100 Points","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-21","Wine":"Château Guadet","Producer":"Château Guadet","Appellation":"St-Emilion Grand Cru","Vintage":"2020","Price_CHF":59,"Original_Price_CHF":59,"Email_Subject":"Château Guadet 2020 & 2016","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-21","Wine":"Château Guadet","Producer":"Château Guadet","Appellation":"St-Emilion Grand Cru","Vintage":"2016","Price_CHF":59,"Original_Price_CHF":59,"Email_Subject":"Château Guadet 2020 & 2016","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-22","Wine":"Etna Rosso","Producer":"Giovanni Rosso","Appellation":"Etna","Vintage":"2019","Price_CHF":26,"Original_Price_CHF":26,"Email_Subject":"95 Points ETNA (Sicily) @ CHF 26.- ...A Must Buy...Jane Anson","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-22","Wine":"Château Canon","Producer":"Château Canon","Appellation":"St-Emilion Grand Cru","Vintage":"2019","Price_CHF":89,"Original_Price_CHF":89,"Email_Subject":"3 x 100 Points CANON @ CHF 89.-","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-22","Wine":"Bourgogne Blanc","Producer":"Domaine Roulot","Appellation":"Bourgogne","Vintage":"2023","Price_CHF":95,"Original_Price_CHF":95,"Email_Subject":"Domaine ROULOT ...The King of Meursault...","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-22","Wine":"Meursault Les Narvaux","Producer":"Domaine Roulot","Appellation":"Meursault","Vintage":"2023","Price_CHF":255,"Original_Price_CHF":255,"Email_Subject":"Domaine ROULOT ...The King of Meursault...","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-23","Wine":"Vega Sicilia Unico Reserva Especial","Producer":"Vega Sicilia","Appellation":"Ribera del Duero","Vintage":"NV","Price_CHF":360,"Original_Price_CHF":360,"Email_Subject":"Vega Sicilia Unico Reserva Especial","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-23","Wine":"Puligny-Montrachet 1er Cru Les Pucelles","Producer":"Maison Jacques Moinel","Appellation":"Puligny-Montrachet","Vintage":"2023","Price_CHF":69,"Original_Price_CHF":69,"Email_Subject":"Puligny-Montrachet 1er Cru Les Pucelles 2023","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-23","Wine":"Champagne Largillier","Producer":"Guillaume Selosse","Appellation":"Champagne","Vintage":"NV","Price_CHF":420,"Original_Price_CHF":420,"Email_Subject":"Guillaume Selosse - Largillier & Au-Dessus du Gros Mont","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-23","Wine":"Champagne Au-Dessus du Gros Mont","Producer":"Guillaume Selosse","Appellation":"Champagne","Vintage":"NV","Price_CHF":580,"Original_Price_CHF":580,"Email_Subject":"Guillaume Selosse - Largillier & Au-Dessus du Gros Mont","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-23","Wine":"Guado al Tasso","Producer":"Marchesi Antinori","Appellation":"Bolgheri","Vintage":"2023","Price_CHF":95,"Original_Price_CHF":95,"Email_Subject":"Guado al Tasso Bolgheri 2023","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-24","Wine":"Perrier-Jouët Blanc de Blancs","Producer":"Perrier-Jouët","Appellation":"Champagne","Vintage":"NV","Price_CHF":49.5,"Original_Price_CHF":54.5,"Email_Subject":"Perrier-Jouet Blanc de Blancs NV","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-24","Wine":"Château Minuty 281 Rosé","Producer":"Château Minuty","Appellation":"Côtes de Provence","Vintage":"2025","Price_CHF":35,"Original_Price_CHF":39,"Email_Subject":"Château Minuty 281 Rosé 2025","Source":"Edulis (edulis.ch)"},{"Date":"2026-04-24","Wine":"Château Sociando-Mallet (Magnum)","Producer":"Château Sociando-Mallet","Appellation":"Haut-Médoc","Vintage":"2018","Price_CHF":29.5,"Original_Price_CHF":34.5,"Email_Subject":"Château Sociando-Mallet 2018 Magnum","Source":"Edulis (edulis.ch)"}];

function showTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[onclick="showTab(\''+t+'\')"]').classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
}

function fmt(n){return n%1===0?n.toFixed(0):n.toFixed(2);}

// Stats
const totalBtl = P.reduce((a,r)=>a+(+r.Qty_Bottles||0),0);
const totalOrders = P.length;
const totalCHF = P.reduce((a,r)=>a+((+r.Qty_Bottles||0)*(+r.Price_Per_Bottle_CHF||0)),0);
const avgPrice = totalBtl>0?(totalCHF/totalBtl):0;
const totalOffers = O.length;

const statsData = [
  ['Bottles Purchased', totalBtl, 'int'],
  ['Orders', totalOrders, 'int'],
  ['CHF Total', totalCHF>0?('CHF '+fmt(totalCHF)):null, 'chf'],
  ['CHF Avg / bt', avgPrice>0?('CHF '+fmt(avgPrice)):null, 'chf'],
  ['Offers Received', totalOffers, 'int']
];
document.getElementById('stats-area').innerHTML = statsData.map(([l,v,type])=>{
  let cls, display;
  if(type==='int'){
    cls='stat-value'; display=v;
  } else if(v){
    cls='stat-value sm'; display=v;
  } else {
    cls='stat-nil'; display='—';
  }
  return `<div class="stat"><div class="stat-label">${l}</div><div class="${cls}">${display}</div></div>`;
}).join('');

// Offers table
const ob = document.getElementById('offers-body');
if(O.length===0){
  ob.innerHTML='<tr><td colspan="7"><div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No offers yet</div><div class="empty-desc">Offers will appear here after the next email pipeline run.</div></div></td></tr>';
} else {
  O.slice().sort((a,b)=>b.Date.localeCompare(a.Date)).forEach(r=>{
    const save = r.Original_Price_CHF>r.Price_CHF;
    const savePct = save?Math.round((1-r.Price_CHF/r.Original_Price_CHF)*100):0;
    // Strip redundant AOCprefix from wine name if it duplicates the appellation
    // e.g. "Champagne Largillier" when Appellation="Champagne" → "Largillier"
    let wineName = r.Wine;
    if(r.Appellation && wineName.startsWith(r.Appellation+' ')){
      wineName = wineName.slice(r.Appellation.length+1);
    }
    // Format source: split at first '(' for two-line display
    const srcMatch = r.Source.match(/^([^(]+)\s*\(([^)]+)\)$/);
    const srcMain = srcMatch ? srcMatch[1].trim() : r.Source;
    const srcSub  = srcMatch ? srcMatch[2] : '';
    ob.innerHTML+=`<tr>
      <td>${r.Date}</td>
      <td>${wineName}${save?` <span class="badge badge-save">-${savePct}%</span>`:''}</td>
      <td>${r.Producer}</td>
      <td>${r.Appellation}</td>
      <td>${r.Vintage}</td>
      <td class="price">CHF ${fmt(r.Price_CHF)}${save?`<span class="orig">CHF ${fmt(r.Original_Price_CHF)}</span>`:''}</td>
      <td><span class="retailer-name">${srcMain}</span>${srcSub?`<span class="retailer-domain">${srcSub}</span>`:''}</td>
    </tr>`;
  });
}

// Purchases table
const pb = document.getElementById('purchases-body');
if(P.length===0){
  pb.innerHTML='<er><td colspan="8"><div class="empty"><div class="empty-icon">🛒</div><div class="empty-title">No purchases recorded</div><div class="empty-desc">Purchase records.will appear here once logged.</div></div></td></tr>';
} else {
  P.forEach(r=>{
    pb.innerHTML+=`<tr>
      <td>${r.Order_Date}</td>
      <td>${r.Wine}</td>
      <td>${r.Producer}</td>
      <td>${r.Appellation}</td>
      <td>${r.Vintage}</td>
      <td>${r.Qty_Bottles}</td>
      <td class="price">CHF ${fmt(+r.Price_Per_Bottle_CHF)}</td>
      <td>${r.Order_Note||''}</td>
    </tr>`;
  });
}
</script>
</body>
</html>
