<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><!-- v2026-04-26 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edulis Offers — Private Cellar</title>
<link rel="icon" type="image/svg+xml" href="../favicon-wine.svg">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --card: #1e1e1e;
  --border: #2a2a2a;
  --accent: #c9a84c;
  --accent2: #8b6914;
  --text: #e8e8e8;
  --muted: #888;
  --green: #4caf7d;
  --red: #e05555;
  --blue: #4a90d9;
  --pill-bg: #252525;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex;
                align-items: center; gap: 16px; height: 56px; }
.logo { font-size: 18px; font-weight: 700; color: var(--accent);
        letter-spacing: .5px; white-space: nowrap; }
.logo span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
.updated { color: var(--muted); font-size: 11px; white-space: nowrap; margin-left: auto; }
.lang-toggle { display: flex; background: var(--pill-bg); border: 1px solid var(--border);
               border-radius: 20px; overflow: hidden; margin-left: 8px; flex-shrink: 0; }
.lang-btn { padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
            color: var(--muted); border: none; background: none; transition: .15s; letter-spacing: .04em; }
.lang-btn.active { background: var(--accent2); color: var(--accent); }
.tabs { background: var(--surface); border-bottom: 1px solid var(--border); }
.tabs-inner { max-width: 1200px; margin: 0 auto; display: flex; padding: 0 20px; gap: 4px; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
       cursor: pointer; border-bottom: 2px solid transparent; transition: .2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }
.stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; }
.stats-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 28px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.filters-wrap { max-width: 1200px; margin: 0 auto; padding: 14px 20px;
                display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                letter-spacing: .05em; margin-right: 2px; }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-btn { background: var(--pill-bg); border: 1px solid var(--border); color: var(--muted);
              border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
              transition: .15s; white-space: nowrap; }
.filter-btn.active { background: var(--accent2); border-color: var(--accent); color: var(--accent); }
.filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.filter-sep { color: var(--border); margin: 0 4px; }
.sort-row { max-width: 1200px; margin: 0 auto; padding: 0 20px 10px;
            display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
.sort-btn { cursor: pointer; padding: 3px 8px; border-radius: 4px; transition: .15s; }
.sort-btn.active { color: var(--accent); background: var(--pill-bg); }
.sort-btn:hover:not(.active) { color: var(--text); }
.result-count { margin-left: auto; }
.tbl-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--card); color: var(--muted); font-weight: 600; text-align: left;
     padding: 10px 12px; border-bottom: 2px solid var(--border);
     font-size: 11px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--card); }
tr.is-new td { border-left: 2px solid var(--accent); }
tr.is-new td:first-child { padding-left: 10px; }
.wine-name { font-weight: 600; color: var(--text); }
.producer-cell { color: var(--muted); font-size: 12px; }
.price-cell { color: var(--accent); font-weight: 700; white-space: nowrap; }
.orig { text-decoration: line-through; color: var(--muted); font-size: 11px;
        font-weight: 400; margin-left: 5px; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px;
         font-size: 10px; font-weight: 700; vertical-align: middle; margin-left: 6px; }
.badge-new { background: rgba(201,168,76,.12); color: var(--accent);
             border: 1px solid rgba(201,168,76,.3); }
.badge-disc { background: rgba(76,175,125,.1); color: var(--green);
              border: 1px solid rgba(76,175,125,.25); }
.evol-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
             margin-bottom: 6px; padding: 12px 14px; }
.evol-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.evol-row { display: flex; gap: 12px; font-size: 12px; padding: 4px 0;
            border-top: 1px solid var(--border); align-items: center; }
.evol-date { color: var(--muted); min-width: 90px; }
.evol-price { color: var(--accent); font-weight: 700; min-width: 80px; }
.evol-delta-up { color: var(--red); font-weight: 600; font-size: 11px; }
.evol-delta-dn { color: var(--green); font-weight: 600; font-size: 11px; }
.evol-delta-flat { color: var(--muted); font-size: 11px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
.no-results { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 13px; }
.pur-note { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 13px; }
@media (max-width: 600px) {
  .stats-inner { gap: 16px; }
  .producer-cell { display: none; }
  .logo span { display: none; }
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">🍷 Edulis Offers <span id="logo-sub">Private Cellar</span></div>
    <div class="updated" id="updated-lbl"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <div class="tab active" id="tab-btn-offers" onclick="showTab('offers')"><span data-key="tabOffers">All Offers</span></div>
    <div class="tab" id="tab-btn-evolution" onclick="showTab('evolution')"><span data-key="tabEvolution">Price Evolution</span></div>
    <div class="tab" id="tab-btn-purchases" onclick="showTab('purchases')"><span data-key="tabPurchases">Purchases</span></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner" id="stats-inner"></div>
</div>

<!-- ALL OFFERS TAB -->
<div class="tab-panel active" id="panel-offers">
  <div class="filters-wrap">
    <span class="filter-label" id="lbl-vintage"></span>
    <div class="filter-group" id="flt-vintage"></div>
    <span class="filter-sep">|</span>
    <span class="filter-label" id="lbl-appellation"></span>
    <div class="filter-group" id="flt-appellation"></div>
  </div>
  <div class="sort-row">
    <span id="lbl-sort" style="margin-right:2px"></span>
    <span class="sort-btn active" id="sb-Date" onclick="sortBy('Date')"></span>
    <span class="sort-btn" id="sb-Wine" onclick="sortBy('Wine')"></span>
    <span class="sort-btn" id="sb-Appellation" onclick="sortBy('Appellation')"></span>
    <span class="sort-btn" id="sb-Vintage" onclick="sortBy('Vintage')"></span>
    <span class="sort-btn" id="sb-Price_CHF" onclick="sortBy('Price_CHF')"></span>
    <span class="result-count" id="result-count"></span>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th id="th-date"></th>
        <th id="th-wine"></th>
        <th id="th-producer"></th>
        <th id="th-appellation"></th>
        <th id="th-vintage"></th>
        <th id="th-price"></th>
      </tr></thead>
      <tbody id="offers-body"></tbody>
    </table>
  </div>
</div>

<!-- PRICE EVOLUTION TAB -->
<div class="tab-panel" id="panel-evolution">
  <div class="tbl-wrap" style="padding-top:20px">
    <div id="evol-body"></div>
  </div>
</div>

<!-- PURCHASES TAB -->
<div class="tab-panel" id="panel-purchases">
  <div class="tbl-wrap" style="padding-top:20px">
    <table>
      <thead><tr>
        <th id="th-pur-date"></th>
        <th id="th-pur-wine"></th>
        <th id="th-pur-producer"></th>
        <th id="th-pur-vintage"></th>
        <th id="th-pur-qty" style="text-align:center"></th>
        <th id="th-pur-price" style="text-align:right"></th>
        <th id="th-pur-total" style="text-align:right"></th>
        <th id="th-pur-note"></th>
      </tr></thead>
      <tbody id="purchases-body"></tbody>
    </table>
  </div>
</div>

<script>
const TODAY = "2026-04-26";
const LATEST_DATE = "2026-04-26";
const O = [{"Date": "2026-04-26", "Wine": "Sassicaia", "Producer": "Tenuta San Guido", "Appellation": "Bolgheri Sassicaia DOC", "Vintage": "2020", "Price_CHF": 189.0, "Original_Price_CHF": 189.0}, {"Date": "2026-04-26", "Wine": "Il Pino di Biserno", "Producer": "Tenuta di Biserno", "Appellation": "Bolgheri", "Vintage": "2023", "Price_CHF": 39.0, "Original_Price_CHF": 39.0}, {"Date": "2026-04-26", "Wine": "Château Canon-La-Gaffelière", "Producer": "Château Canon-La-Gaffelière", "Appellation": "St-Emilion 1er Grand Cru Classé", "Vintage": "2020", "Price_CHF": 59.0, "Original_Price_CHF": 70.0}, {"Date": "2026-04-26", "Wine": "Merlot Platinum", "Producer": "Guido Brivio", "Appellation": "Ticino", "Vintage": "2021", "Price_CHF": 69.9, "Original_Price_CHF": 69.9}, {"Date": "2026-04-26", "Wine": "Champagne Fallet-Gourron Blanc de Blancs Brut Classique", "Producer": "Fallet-Gourron", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 55.0, "Original_Price_CHF": 55.0}, {"Date": "2026-04-26", "Wine": "Champagne Fallet-Gourron Blanc de Blancs Non Dosé", "Producer": "Fallet-Gourron", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 55.0, "Original_Price_CHF": 55.0}, {"Date": "2026-04-25", "Wine": "Château Ducru-Beaucaillou", "Producer": "Château Ducru-Beaucaillou", "Appellation": "St-Julien", "Vintage": "2020", "Price_CHF": 159.0, "Original_Price_CHF": 159.0}, {"Date": "2026-04-25", "Wine": "Barolo Le Vigne", "Producer": "Luciano Sandrone", "Appellation": "Barolo", "Vintage": "2021", "Price_CHF": 69.0, "Original_Price_CHF": 69.0}, {"Date": "2026-04-25", "Wine": "Château Giscours", "Producer": "Château Giscours", "Appellation": "Margaux", "Vintage": "2020", "Price_CHF": 47.0, "Original_Price_CHF": 47.0}, {"Date": "2026-04-25", "Wine": "Chablis La Pierrelée", "Producer": "La Chablisienne", "Appellation": "Chablis", "Vintage": "2021", "Price_CHF": 19.0, "Original_Price_CHF": 19.0}, {"Date": "2026-04-24", "Wine": "Château Montrose", "Producer": "Château Montrose", "Appellation": "St-Estèphe", "Vintage": "2015", "Price_CHF": 129.0, "Original_Price_CHF": 129.0}, {"Date": "2026-04-24", "Wine": "Perrier-Jouët Blanc de Blancs", "Producer": "Perrier-Jouët", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 49.5, "Original_Price_CHF": 54.5}, {"Date": "2026-04-24", "Wine": "Château Minuty 281 Rosé", "Producer": "Château Minuty", "Appellation": "Côtes de Provence", "Vintage": "2025", "Price_CHF": 35.0, "Original_Price_CHF": 39.0}, {"Date": "2026-04-24", "Wine": "Château Sociando-Mallet (Magnum)", "Producer": "Château Sociando-Mallet", "Appellation": "Haut-Médoc", "Vintage": "2018", "Price_CHF": 29.5, "Original_Price_CHF": 34.5}, {"Date": "2026-04-23", "Wine": "Vega Sicilia Unico Reserva Especial", "Producer": "Vega Sicilia", "Appellation": "Ribera del Duero", "Vintage": "NV", "Price_CHF": 360.0, "Original_Price_CHF": 360.0}, {"Date": "2026-04-23", "Wine": "Puligny-Montrachet 1er Cru Les Pucelles", "Producer": "Maison Jacques Moinel", "Appellation": "Puligny-Montrachet", "Vintage": "2023", "Price_CHF": 69.0, "Original_Price_CHF": 69.0}, {"Date": "2026-04-23", "Wine": "Champagne Largillier", "Producer": "Guillaume Selosse", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 420.0, "Original_Price_CHF": 420.0}, {"Date": "2026-04-23", "Wine": "Champagne Au-Dessus du Gros Mont", "Producer": "Guillaume Selosse", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 580.0, "Original_Price_CHF": 580.0}, {"Date": "2026-04-23", "Wine": "Guado al Tasso", "Producer": "Marchesi Antinori", "Appellation": "Bolgheri", "Vintage": "2023", "Price_CHF": 95.0, "Original_Price_CHF": 95.0}, {"Date": "2026-04-22", "Wine": "Etna Rosso", "Producer": "Giovanni Rosso", "Appellation": "Etna", "Vintage": "2019", "Price_CHF": 26.0, "Original_Price_CHF": 26.0}, {"Date": "2026-04-22", "Wine": "Château Canon", "Producer": "Château Canon", "Appellation": "St-Emilion Grand Cru", "Vintage": "2019", "Price_CHF": 89.0, "Original_Price_CHF": 89.0}, {"Date": "2026-04-22", "Wine": "Bourgogne Blanc", "Producer": "Domaine Roulot", "Appellation": "Bourgogne", "Vintage": "2023", "Price_CHF": 95.0, "Original_Price_CHF": 95.0}, {"Date": "2026-04-22", "Wine": "Meursault Les Narvaux", "Producer": "Domaine Roulot", "Appellation": "Meursault", "Vintage": "2023", "Price_CHF": 255.0, "Original_Price_CHF": 255.0}, {"Date": "2026-04-21", "Wine": "Ruinart Brut R", "Producer": "Ruinart", "Appellation": "Champagne", "Vintage": "NV", "Price_CHF": 39.0, "Original_Price_CHF": 44.0}, {"Date": "2026-04-21", "Wine": "Petrolo Boggina B", "Producer": "Petrolo", "Appellation": "Toscana IGT", "Vintage": "2021", "Price_CHF": 45.0, "Original_Price_CHF": 45.0}, {"Date": "2026-04-21", "Wine": "Château Boyd-Cantenac", "Producer": "Château Boyd-Cantenac", "Appellation": "Margaux", "Vintage": "2015", "Price_CHF": 39.0, "Original_Price_CHF": 39.0}, {"Date": "2026-04-21", "Wine": "Insignia", "Producer": "Joseph Phelps", "Appellation": "Napa Valley", "Vintage": "2019", "Price_CHF": 165.0, "Original_Price_CHF": 214.0}, {"Date": "2026-04-21", "Wine": "Château Guadet", "Producer": "Château Guadet", "Appellation": "St-Emilion Grand Cru", "Vintage": "2020", "Price_CHF": 59.0, "Original_Price_CHF": 59.0}, {"Date": "2026-04-21", "Wine": "Château Guadet", "Producer": "Château Guadet", "Appellation": "St-Emilion Grand Cru", "Vintage": "2016", "Price_CHF": 59.0, "Original_Price_CHF": 59.0}];
const P = [];

// ── i18n ──────────────────────────────────────────────────────────
const I18N = {
  en: {
    logoSub: 'Private Cellar',
    updated: d => 'Updated ' + d,
    tabOffers: 'All Offers', tabEvolution: 'Price Evolution', tabPurchases: 'Purchases',
    statOffers: 'Offers received', statDisc: 'Discounted', statAvg: 'Avg price / bt', statLatest: 'Latest offer',
    filterVintage: 'Vintage', filterApp: 'Appellation', filterAll: 'All',
    sortLabel: 'Sort:', sortDate: 'Date', sortWine: 'Wine', sortApp: 'Appellation', sortVintage: 'Vintage', sortPrice: 'Price',
    thDate: 'Date', thWine: 'Wine', thProducer: 'Producer', thApp: 'Appellation', thVintage: 'Vint.', thPrice: 'Price CHF / bt',
    thPurDate: 'Date', thPurWine: 'Wine', thPurProd: 'Producer', thPurVint: 'Vintage',
    thPurQty: 'Qty', thPurPrice: 'CHF/bt', thPurTotal: 'Total CHF', thPurNote: 'Note',
    results: n => n + ' offer' + (n !== 1 ? 's' : ''),
    noResults: 'No results for these filters.',
    evolEmpty: 'No wines have been offered more than once yet.',
    purEmpty: 'No purchases recorded yet.',
  },
  fr: {
    logoSub: 'Cave Privée',
    updated: d => 'Mis à jour le ' + d,
    tabOffers: 'Toutes les offres', tabEvolution: 'Évolution des prix', tabPurchases: 'Achats',
    statOffers: 'Offres reçues', statDisc: 'Avec remise', statAvg: 'Prix moy. / bt', statLatest: 'Dernière offre',
    filterVintage: 'Millésime', filterApp: 'Appellation', filterAll: 'Tous',
    sortLabel: 'Trier :', sortDate: 'Date', sortWine: 'Vin', sortApp: 'Appellation', sortVintage: 'Millésime', sortPrice: 'Prix',
    thDate: 'Date', thWine: 'Vin', thProducer: 'Producteur', thApp: 'Appellation', thVintage: 'Mill.', thPrice: 'Prix CHF / bt',
    thPurDate: 'Date', thPurWine: 'Vin', thPurProd: 'Producteur', thPurVint: 'Millésime',
    thPurQty: 'Qté', thPurPrice: 'CHF/bt', thPurTotal: 'Total CHF', thPurNote: 'Note',
    results: n => n + ' offre' + (n !== 1 ? 's' : ''),
    noResults: 'Aucun résultat pour ces filtres.',
    evolEmpty: 'Aucun vin n\'a encore été offert plus d\'une fois.',
    purEmpty: 'Aucun achat enregistré.',
  }
};

let LANG = localStorage.getItem('wine-lang') || 'en';
let activeVintage = '', activeApp = '';
let sortCol = 'Date', sortDir = -1;
let currentTab = 'offers';

function fmt(n) { return n % 1 === 0 ? n.toFixed(0) : n.toFixed(2); }

function fmtDate(d) {
  const enM = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const frM = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const [y, m, day] = d.split('-');
  if (LANG === 'fr') return `${parseInt(day)} ${frM[parseInt(m)-1]} ${y}`;
  return `${enM[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

const discounted = O.filter(r => r.Original_Price_CHF > r.Price_CHF).length;
const avgPrice = O.reduce((a, r) => a + r.Price_CHF, 0) / O.length;
const vintages = [...new Set(O.map(r => r.Vintage))].sort((a,b) => { if(a==='NV')return 1; if(b==='NV')return -1; return b-a; });
const appellations = [...new Set(O.map(r => r.Appellation))].sort();

function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function buildPills(id, items, getActive, setter) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  const T = I18N[LANG];
  [T.filterAll, ...items].forEach((v, i) => {
    const isAll = i === 0;
    const b = document.createElement('span');
    b.className = 'filter-btn' + ((isAll ? getActive() === '' : getActive() === v) ? ' active' : '');
    b.textContent = v;
    b.onclick = () => { setter(isAll ? '' : v); renderOffers(); };
    el.appendChild(b);
  });
}

function applyUI() {
  const T = I18N[LANG];
  document.title = 'Edulis Offers — ' + T.logoSub;
  document.getElementById('logo-sub').textContent = T.logoSub;
  document.getElementById('updated-lbl').textContent = T.updated(fmtDate(TODAY));
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (T[k]) el.textContent = T[k];
  });
  document.getElementById('stats-inner').innerHTML = [
    [T.statOffers, O.length],
    [T.statDisc, discounted],
    [T.statAvg, 'CHF ' + fmt(avgPrice)],
    [T.statLatest, fmtDate(LATEST_DATE)],
  ].map(([l,v]) => `<div class="stat"><div class="stat-val">${typeof v === 'number' ? v : v}</div><div class="stat-lbl">${l}</div></div>`).join('');
  document.getElementById('lbl-vintage').textContent = T.filterVintage;
  document.getElementById('lbl-appellation').textContent = T.filterApp;
  document.getElementById('lbl-sort').textContent = T.sortLabel;
  document.getElementById('sb-Date').textContent = T.sortDate;
  document.getElementById('sb-Wine').textContent = T.sortWine;
  document.getElementById('sb-Appellation').textContent = T.sortApp;
  document.getElementById('sb-Vintage').textContent = T.sortVintage;
  document.getElementById('sb-Price_CHF').textContent = T.sortPrice;
  ['th-date','th-wine','th-producer','th-appellation','th-vintage','th-price'].forEach((id, i) => {
    const keys = ['thDate','thWine','thProducer','thApp','thVintage','thPrice'];
    document.getElementById(id).textContent = T[keys[i]];
  });
  ['th-pur-date','th-pur-wine','th-pur-producer','th-pur-vintage','th-pur-qty','th-pur-price','th-pur-total','th-pur-note'].forEach((id, i) => {
    const keys = ['thPurDate','thPurWine','thPurProd','thPurVint','thPurQty','thPurPrice','thPurTotal','thPurNote'];
    document.getElementById(id).textContent = T[keys[i]];
  });
  document.getElementById('btn-en').classList.toggle('active', LANG === 'en');
  document.getElementById('btn-fr').classList.toggle('active', LANG === 'fr');
  buildPills('flt-vintage', vintages, () => activeVintage, v => activeVintage = v);
  buildPills('flt-appellation', appellations, () => activeApp, v => activeApp = v);
  renderOffers();
  renderEvolution();
  renderPurchases();
}

function setLang(lang) {
  LANG = lang;
  localStorage.setItem('wine-lang', lang);
  applyUI();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sb-' + col).classList.add('active');
  renderOffers();
}

function renderOffers() {
  const T = I18N[LANG];
  let data = O.filter(r => (!activeVintage || r.Vintage === activeVintage) && (!activeApp || r.Appellation === activeApp));
  data = data.slice().sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'Price_CHF') { va = +va; vb = +vb; }
    if (va < vb) return -sortDir; if (va > vb) return sortDir; return 0;
  });
  document.getElementById('result-count').textContent = T.results(data.length);
  const ob = document.getElementById('offers-body');
  if (!data.length) {
    ob.innerHTML = `<tr><td colspan="6"><div class="no-results">${T.noResults}</div></td></tr>`;
    return;
  }
  ob.innerHTML = data.map(r => {
    const isNew = r.Date === LATEST_DATE;
    const save = r.Original_Price_CHF > r.Price_CHF;
    const savePct = save ? Math.round((1 - r.Price_CHF / r.Original_Price_CHF) * 100) : 0;
    return `<tr class="${isNew ? 'is-new' : ''}">
      <td>${r.Date}</td>
      <td class="wine-name">${r.Wine}${isNew ? '<span class="badge badge-new">NEW</span>' : ''}${save ? `<span class="badge badge-disc">-${savePct}%</span>` : ''}</td>
      <td class="producer-cell">${r.Producer}</td>
      <td>${r.Appellation}</td>
      <td>${r.Vintage}</td>
      <td class="price-cell">CHF ${fmt(r.Price_CHF)}${save ? `<span class="orig">CHF ${fmt(r.Original_Price_CHF)}</span>` : ''}</td>
    </tr>`;
  }).join('');
}

function renderEvolution() {
  const T = I18N[LANG];
  const byKey = {};
  O.forEach(r => {
    const k = r.Wine + '|' + r.Vintage;
    if (!byKey[k]) byKey[k] = { wine: r.Wine, vintage: r.Vintage, entries: [] };
    byKey[k].entries.push(r);
  });
  const multi = Object.values(byKey).filter(w => w.entries.length > 1)
    .sort((a,b) => a.wine.localeCompare(b.wine));
  const eb = document.getElementById('evol-body');
  if (!multi.length) {
    eb.innerHTML = `<div class="empty">${T.evolEmpty}</div>`;
    return;
  }
  eb.innerHTML = multi.map(w => {
    const sorted = w.entries.slice().sort((a,b) => a.Date.localeCompare(b.Date));
    const rows = sorted.map((r, i) => {
      let delta = '';
      if (i > 0) {
        const prev = sorted[i-1].Price_CHF;
        const diff = r.Price_CHF - prev;
        const pct = Math.round((diff / prev) * 100);
        if (diff > 0) delta = `<span class="evol-delta-up">▲ ${fmt(Math.abs(diff))} (+${pct}%)</span>`;
        else if (diff < 0) delta = `<span class="evol-delta-dn">▼ ${fmt(Math.abs(diff))} (${pct}%)</span>`;
        else delta = `<span class="evol-delta-flat">— unchanged</span>`;
      }
      return `<div class="evol-row"><span class="evol-date">${r.Date}</span><span class="evol-price">CHF ${fmt(r.Price_CHF)}</span>${delta}</div>`;
    }).join('');
    return `<div class="evol-card"><div class="evol-name">${w.wine} <span style="color:var(--muted);font-size:12px;font-weight:400">${w.vintage}</span></div>${rows}</div>`;
  }).join('');
}

function renderPurchases() {
  const T = I18N[LANG];
  const pb = document.getElementById('purchases-body');
  if (!P.length) {
    pb.innerHTML = `<tr><td colspan="8"><div class="pur-note">${T.purEmpty}</div></td></tr>`;
    return;
  }
  pb.innerHTML = P.map(r => `<tr>
    <td>${r.Date}</td><td>${r.Wine}</td><td>${r.Producer}</td><td>${r.Vintage}</td>
    <td style="text-align:center">${r.Qty}</td>
    <td style="text-align:right" class="price-cell">CHF ${fmt(+r.Price_CHF)}</td>
    <td style="text-align:right">CHF ${fmt(r.Qty * r.Price_CHF)}</td>
    <td style="color:var(--muted);font-size:12px">${r.Note || ''}</td>
  </tr>`).join('');
}

applyUI();
</script>
</body>
</html>
