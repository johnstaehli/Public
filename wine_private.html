<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offres Edulis — Cave Privée</title>
<link rel="icon" href="../favicon-wine.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f12;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:24px 16px}
h1{font-size:1.5rem;font-weight:700;color:#f8fafc;margin-bottom:4px}
.sub{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat{background:#1a1a24;border:1px solid #2d2d3d;border-radius:10px;padding:16px}
.stat-label{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:1.6rem;font-weight:700;color:#a78bfa}
.stat-value.sm{font-size:1.1rem}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.filters select{background:#1a1a24;border:1px solid #2d2d3d;color:#cbd5e1;border-radius:6px;padding:6px 10px;font-size:.82rem;cursor:pointer}
.filters select:focus{outline:none;border-color:#a78bfa}
.filter-reset{background:none;border:1px solid #2d2d3d;color:#64748b;border-radius:6px;padding:6px 12px;font-size:.78rem;cursor:pointer;transition:.15s}
.filter-reset:hover{border-color:#a78bfa;color:#a78bfa}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #2d2d3d}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:#1a1a24;color:#64748b;font-weight:600;text-align:left;padding:10px 12px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#a78bfa}
td{padding:9px 12px;border-top:1px solid #1e1e2d;color:#cbd5e1;vertical-align:middle}
tr:hover td{background:#13131c}
tr.is-new td{background:#1a1a2e}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.71rem;font-weight:700;vertical-align:middle;margin-left:6px}
.badge-new{background:#312060;color:#c4b5fd;border:1px solid #4c1d95}
.badge-save{background:#1a2e1a;color:#4ade80}
.price{font-weight:600;color:#a78bfa;white-space:nowrap}
.orig{text-decoration:line-through;color:#475569;font-size:.78rem;margin-left:5px}
.wine-name{font-weight:500;color:#f1f5f9}
.appellation{color:#94a3b8;font-size:.80rem}
.producer{color:#64748b;font-size:.80rem}
.empty{text-align:center;padding:48px 24px;color:#475569}
.no-results{text-align:center;padding:32px;color:#475569;font-size:.85rem}
</style>
</head>
<body>
<h1>Offres Edulis — Cave Privée</h1>
<div class="sub">Mis à jour le <span id="updated-date"></span></div>

<div class="stats" id="stats-area"></div>

<div class="filters">
  <label>Millésime</label>
  <select id="filter-vintage" onchange="applyFilters()">
    <option value="">Tous</option>
  </select>
  <label>Appellation</label>
  <select id="filter-appellation" onchange="applyFilters()">
    <option value="">Toutes</option>
  </select>
  <button class="filter-reset" onclick="resetFilters()">Réinitialiser</button>
</div>

<div class="tbl-wrap">
  <table id="offers-table">
    <thead><tr>
      <th onclick="sortBy('Date')">Date</th>
      <th onclick="sortBy('Wine')">Vin</th>
      <th onclick="sortBy('Producer')">Producteur</th>
      <th onclick="sortBy('Appellation')">Appellation</th>
      <th onclick="sortBy('Vintage')">Mill.</th>
      <th onclick="sortBy('Price_CHF')">Prix CHF</th>
    </tr></thead>
    <tbody id="offers-body"></tbody>
  </table>
</div>

<script>
const TODAY = "2026-04-24";
const LATEST_DATE = "2026-04-24";

// Inline data from CSV — newest first
const O=[{"Date":"2026-04-24","Wine":"Perrier-Jouët Blanc de Blancs","Producer":"Perrier-Jouët","Appellation":"Champagne","Vintage":"NV","Price_CHF":49.50,"Original_Price_CHF":54.50},{"Date":"2026-04-24","Wine":"Château Minuty 281 Rosé","Producer":"Château Minuty","Appellation":"Côtes de Provence","Vintage":"2025","Price_CHF":35.00,"Original_Price_CHF":39.00},{"Date":"2026-04-24","Wine":"Château Sociando-Mallet (Magnum)","Producer":"Château Sociando-Mallet","Appellation":"Haut-Médoc","Vintage":"2018","Price_CHF":29.50,"Original_Price_CHF":34.50},{"Date":"2026-04-23","Wine":"Vega Sicilia Unico Reserva Especial","Producer":"Vega Sicilia","Appellation":"Ribera del Duero","Vintage":"NV","Price_CHF":360.00,"Original_Price_CHF":360.00},{"Date":"2026-04-23","Wine":"Puligny-Montrachet 1er Cru Les Pucelles","Producer":"Maison Jacques Moinel","Appellation":"Puligny-Montrachet","Vintage":"2023","Price_CHF":69.00,"Original_Price_CHF":69.00},{"Date":"2026-04-23","Wine":"Champagne Largillier","Producer":"Guillaume Selosse","Appellation":"Champagne","Vintage":"NV","Price_CHF":420.00,"Original_Price_CHF":420.00},{"Date":"2026-04-23","Wine":"Champagne Au-Dessus du Gros Mont","Producer":"Guillaume Selosse","Appellation":"Champagne","Vintage":"NV","Price_CHF":580.00,"Original_Price_CHF":580.00},{"Date":"2026-04-23","Wine":"Guado al Tasso","Producer":"Marchesi Antinori","Appellation":"Bolgheri","Vintage":"2023","Price_CHF":95.00,"Original_Price_CHF":95.00},{"Date":"2026-04-22","Wine":"Etna Rosso","Producer":"Giovanni Rosso","Appellation":"Etna","Vintage":"2019","Price_CHF":26.00,"Original_Price_CHF":26.00},{"Date":"2026-04-22","Wine":"Château Canon","Producer":"Château Canon","Appellation":"St-Emilion Grand Cru","Vintage":"2019","Price_CHF":89.00,"Original_Price_CHF":89.00},{"Date":"2026-04-22","Wine":"Bourgogne Blanc","Producer":"Domaine Roulot","Appellation":"Bourgogne","Vintage":"2023","Price_CHF":95.00,"Original_Price_CHF":95.00},{"Date":"2026-04-22","Wine":"Meursault Les Narvaux","Producer":"Domaine Roulot","Appellation":"Meursault","Vintage":"2023","Price_CHF":255.00,"Original_Price_CHF":255.00},{"Date":"2026-04-21","Wine":"Ruinart Brut R","Producer":"Ruinart","Appellation":"Champagne","Vintage":"NV","Price_CHF":39.00,"Original_Price_CHF":44.00},{"Date":"2026-04-21","Wine":"Petrolo Boggina B","Producer":"Petrolo","Appellation":"Toscana IGT","Vintage":"2021","Price_CHF":45.00,"Original_Price_CHF":45.00},{"Date":"2026-04-21","Wine":"Château Boyd-Cantenac","Producer":"Château Boyd-Cantenac","Appellation":"Margaux","Vintage":"2015","Price_CHF":39.00,"Original_Price_CHF":39.00},{"Date":"2026-04-21","Wine":"Insignia","Producer":"Joseph Phelps","Appellation":"Napa Valley","Vintage":"2019","Price_CHF":165.00,"Original_Price_CHF":214.00},{"Date":"2026-04-21","Wine":"Château Guadet","Producer":"Château Guadet","Appellation":"St-Emilion Grand Cru","Vintage":"2020","Price_CHF":59.00,"Original_Price_CHF":59.00},{"Date":"2026-04-21","Wine":"Château Guadet","Producer":"Château Guadet","Appellation":"St-Emilion Grand Cru","Vintage":"2016","Price_CHF":59.00,"Original_Price_CHF":59.00}];

// Format date as human-readable
function fmtDate(d){
  const months=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}
document.getElementById('updated-date').textContent = fmtDate(TODAY);

// Stats
const totalOffers = O.length;
const discounted = O.filter(r=>r.Original_Price_CHF > r.Price_CHF).length;
const avgPrice = O.reduce((a,r)=>a+r.Price_CHF,0)/O.length;
function fmt(n){return n%1===0?n.toFixed(0):n.toFixed(2);}

document.getElementById('stats-area').innerHTML = [
  ['Offres reçues', totalOffers],
  ['Avec remise', discounted],
  ['Prix moy. / bt', 'CHF '+fmt(avgPrice)],
  ['Dernière offre', fmtDate(LATEST_DATE)]
].map(([l,v])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-value${typeof v==='string'&&v.length>6?' sm':''}">${v}</div></div>`).join('');

// Populate filters
const vintages = [...new Set(O.map(r=>r.Vintage))].sort((a,b)=>{
  if(a==='NV') return 1; if(b==='NV') return -1; return b-a;
});
const appellations = [...new Set(O.map(r=>r.Appellation))].sort();
const fv = document.getElementById('filter-vintage');
const fa = document.getElementById('filter-appellation');
vintages.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;fv.appendChild(o);});
appellations.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;fa.appendChild(o);});

let sortCol='Date', sortDir=-1;

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  render();
}

function applyFilters(){render();}
function resetFilters(){fv.value='';fa.value='';render();}

function render(){
  const vf=fv.value, af=fa.value;
  let data=O.filter(r=>(!vf||r.Vintage===vf)&&(!af||r.Appellation===af));
  data=data.slice().sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(sortCol==='Price_CHF'){va=+va;vb=+vb;}
    if(va<vb) return -sortDir; if(va>vb) return sortDir; return 0;
  });
  const ob=document.getElementById('offers-body');
  if(data.length===0){
    ob.innerHTML='<tr><td colspan="6"><div class="no-results">Aucun résultat pour ces filtres.</div></td></tr>';
    return;
  }
  ob.innerHTML=data.map(r=>{
    const isNew=r.Date===LATEST_DATE;
    const save=r.Original_Price_CHF>r.Price_CHF;
    const savePct=save?Math.round((1-r.Price_CHF/r.Original_Price_CHF)*100):0;
    return `<tr class="${isNew?'is-new':''}">
      <td>${r.Date}</td>
      <td class="wine-name">${r.Wine}${isNew?'<span class="badge badge-new">NEW</span>':''}${save?`<span class="badge badge-save">-${savePct}%</span>`:''}</td>
      <td class="producer">${r.Producer}</td>
      <td class="appellation">${r.Appellation}</td>
      <td>${r.Vintage}</td>
      <td class="price">CHF ${fmt(r.Price_CHF)}${save?`<span class="orig">CHF ${fmt(r.Original_Price_CHF)}</span>`:''}</td>
    </tr>`;
  }).join('');
}
render();
</script>
</body>
</html>
